name: Shared Setup

on:
  workflow_call:
    inputs:
      build_type:
        required: false
        type: string
        default: 'Release'
      build_tests:
        required: false
        type: boolean
        default: true
      build_benchmarks:
        required: false
        type: boolean
        default: false
      platform:
        required: false
        type: string
        default: 'ubuntu-latest'
      cmake_extra_args:
        required: false
        type: string
        default: ''
      cache_key_prefix:
        required: false
        type: string
        default: 'build'
    outputs:
      cache_key:
        description: "The cache key used for this build"
        value: ${{ jobs.setup.outputs.cache_key }}
      cache_hit:
        description: "Whether there was a cache hit"
        value: ${{ jobs.setup.outputs.cache_hit }}

jobs:
  setup:
    runs-on: ${{ inputs.platform }}
    outputs:
      cache_key: ${{ steps.cache-key.outputs.key }}
      cache_hit: ${{ steps.cache-build.outputs.cache-hit }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Generate cache key
      id: cache-key
      run: |
        echo "key=${{ inputs.cache_key_prefix }}-${{ inputs.platform }}-${{ inputs.build_type }}-${{ hashFiles('**/*.cpp', '**/*.h', '**/*.c', '**/CMakeLists.txt') }}" >> $GITHUB_OUTPUT
      shell: bash
      
    - name: Restore build cache
      id: cache-build
      uses: actions/cache@v3
      with:
        path: build
        key: ${{ steps.cache-key.outputs.key }}
        
    # Reset build directory if cache wasn't found
    - name: Reset build directory
      if: steps.cache-build.outputs.cache-hit != 'true'
      run: |
        rm -rf build
        mkdir -p build
      shell: bash

    - name: Set up dependencies (Ubuntu)
      if: steps.cache-build.outputs.cache-hit != 'true' && inputs.platform == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake make g++ ninja-build

    - name: Set up dependencies (macOS)
      if: steps.cache-build.outputs.cache-hit != 'true' && inputs.platform == 'macos-latest'
      run: |
        brew install cmake ninja

    - name: Configure CMake
      if: steps.cache-build.outputs.cache-hit != 'true'
      run: |
        mkdir -p build
        cd build
        
        CMAKE_ARGS="-DCMAKE_BUILD_TYPE=${{ inputs.build_type }}"
        
        if ${{ inputs.build_tests }}; then
          CMAKE_ARGS+=" -DBUILD_TESTS=ON"
        fi
        
        if ${{ inputs.build_benchmarks }}; then
          CMAKE_ARGS+=" -DBUILD_BENCHMARKS=ON"
        fi
        
        # Add any extra args
        if [ -n "${{ inputs.cmake_extra_args }}" ]; then
          CMAKE_ARGS+=" ${{ inputs.cmake_extra_args }}"
        fi
        
        echo "Running cmake with args: ${CMAKE_ARGS}"
        cmake .. ${CMAKE_ARGS}
      shell: bash 
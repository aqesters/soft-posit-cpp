name: CI for soft-posit-cpp

on:
  push:
    branches: [ "refactor-cpp-soft-posits" ]
  pull_request:
    branches: [ "refactor-cpp-soft-posits" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake make g++ ninja-build

    - name: Create build directory and configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build the library
      run: |
        cd build
        make -j$(nproc)

    - name: Run all tests (make check)
      run: |
        cd build
        make check

    - name: Run all benchmarks (make bench)
      run: |
        cd build
        make bench

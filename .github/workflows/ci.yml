name: CI for soft-posit-cpp

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  setup:
    uses: ./.github/workflows/shared-setup.yml
    with:
      build_type: Release
      build_tests: true
      build_benchmarks: true
      cache_key_prefix: ci
  
  build:
    needs: setup
    uses: ./.github/workflows/shared-build.yml
    with:
      platform: ubuntu-latest
      cache_key: ${{ needs.setup.outputs.cache_key }}
      # Skip building targets if cache hit
      build_targets: ${{ needs.setup.outputs.cache_hit == 'true' && '' || 'all' }}
  
  test_p8:
    needs: build
    uses: ./.github/workflows/shared-build.yml
    with:
      platform: ubuntu-latest
      cache_key: ${{ needs.setup.outputs.cache_key }}
      build_targets: ''
      test_targets: p8_tests
  
  test_p16:
    needs: build
    uses: ./.github/workflows/shared-build.yml
    with:
      platform: ubuntu-latest
      cache_key: ${{ needs.setup.outputs.cache_key }}
      build_targets: ''
      test_targets: p16_tests
  
  test_p32:
    needs: build
    uses: ./.github/workflows/shared-build.yml
    with:
      platform: ubuntu-latest
      cache_key: ${{ needs.setup.outputs.cache_key }}
      build_targets: ''
      test_targets: p32_tests
  
  test_quire:
    needs: build
    uses: ./.github/workflows/shared-build.yml
    with:
      platform: ubuntu-latest
      cache_key: ${{ needs.setup.outputs.cache_key }}
      build_targets: ''
      test_targets: "q8_tests q16_tests q32_tests"

name: Local Tests

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of test to run'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - p8
          - p16
          - p32
          - quire
          - all

jobs:
  setup:
    uses: ./.github/workflows/shared-setup.yml
    with:
      build_type: Release
      build_tests: true
      build_benchmarks: ${{ github.event.inputs.test_type == 'all' }}
      cache_key_prefix: local

  build:
    needs: setup
    uses: ./.github/workflows/shared-build.yml
    with:
      cache_key: ${{ needs.setup.outputs.cache_key }}
      build_targets: >-
        ${{ needs.setup.outputs.cache_hit == 'true' && 
            (github.event.inputs.test_type == 'build' || github.event.inputs.test_type == 'all') && 
            'all' || '' }}

  test:
    needs: [setup, build]
    if: github.event.inputs.test_type != 'build'
    uses: ./.github/workflows/shared-build.yml
    with:
      cache_key: ${{ needs.setup.outputs.cache_key }}
      test_targets: >-
        ${{ github.event.inputs.test_type == 'p8' && 'p8_tests' || 
            github.event.inputs.test_type == 'p16' && 'p16_tests' || 
            github.event.inputs.test_type == 'p32' && 'p32_tests' || 
            github.event.inputs.test_type == 'quire' && 'quire_tests' || 
            github.event.inputs.test_type == 'all' && 'all' || '' }} 